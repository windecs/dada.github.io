<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Таймер: До начала лагеря</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #eef2f3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #2c3e50; margin-bottom: 30px; text-align: center; font-size: 1.8rem; }
        
        /* Таймер */
        .timer { display: flex; gap: 12px; margin-bottom: 40px; flex-wrap: wrap; justify-content: center; }
        .unit {
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            min-width: 80px;
            text-align: center;
        }
        .num { display: block; font-size: 2.5rem; font-weight: 800; color: #3498db; }
        .text { color: #7f8c8d; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px; }

        /* Кнопки */
        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 350px;
        }
        .btn {
            display: block;
            text-align: center;
            padding: 16px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.3s ease;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            filter: brightness(1.1);
        }
        .btn-form { background: #673ab7; }
        .btn-site { background: #2ecc71; }
    </style>
</head>
<body>

    <h1>До лагеря осталось:</h1>

    <div class="timer">
        <div class="unit"><span class="num" id="days">00</span><span class="text">Дней</span></div>
        <div class="unit"><span class="num" id="hours">00</span><span class="text">Часов</span></div>
        <div class="unit"><span class="num" id="mins">00</span><span class="text">Минут</span></div>
        <div class="unit"><span class="num" id="secs">00</span><span class="text">Секунд</span></div>
    </div>

    <div class="buttons-container">
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSd6FG6SKWS6WzCgU0RGZYeTMl637fCiO9BMUG7FuREg-OPk5g/viewform" target="_blank" class="btn btn-form">
            📝 Записаться через форму
        </a>
        <a href="https://ayelatvia.lv/dnevnojlager" target="_blank" class="btn btn-site">
            🏕 Подробнее о лагере
        </a>
    </div>

    <script>
        function updateTimer() {
            // Установка конкретной даты: Год, Месяц (0-11), Число, Часы, Минуты
            const target = new Date(2026, 5, 1, 9, 0, 0).getTime();
            const now = new Date().getTime();
            const diff = target - now;

            if (diff <= 0) {
                document.querySelector(".timer").innerHTML = "<h2>Смена началась!</h2>";
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const m = Math.floor((diff / (1000 * 60)) % 60);
            const s = Math.floor((diff / 1000) % 60);

            document.getElementById('days').innerText = d;
            document.getElementById('hours').innerText = h < 10 ? '0' + h : h;
            document.getElementById('mins').innerText = m < 10 ? '0' + m : m;
            document.getElementById('secs').innerText = s < 10 ? '0' + s : s;
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>

</body>
</html>
