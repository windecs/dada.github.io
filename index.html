<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Таймер до лета и ссылки</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #eef2f3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #2c3e50; margin-bottom: 30px; text-align: center; }
        
        /* Таймер */
        .timer { display: flex; gap: 15px; margin-bottom: 40px; flex-wrap: wrap; justify-content: center; }
        .unit {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            min-width: 90px;
            text-align: center;
        }
        .num { display: block; font-size: 3rem; font-weight: 800; color: #3498db; }
        .text { color: #7f8c8d; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; }

        /* Кнопки */
        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }
        .btn {
            display: block;
            text-align: center;
            padding: 18px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: transform 0.2s, box-shadow 0.2s;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }
        .btn-form { background: #673ab7; } /* Фиолетовый для формы */
        .btn-site { background: #2ecc71; } /* Зеленый для лагеря */
    </style>
</head>
<body>

    <h1>До начала лагеря осталось:</h1>

    <div class="timer">
        <div class="unit"><span class="num" id="days">00</span><span class="text">Дней</span></div>
        <div class="unit"><span class="num" id="hours">00</span><span class="text">Часов</span></div>
        <div class="unit"><span class="num" id="mins">00</span><span class="text">Минут</span></div>
        <div class="unit"><span class="num" id="secs">00</span><span class="text">Секунд</span></div>
    </div>

    <div class="buttons-container">
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSd6FG6SKWS6WzCgU0RGZYeTMl637fCiO9BMUG7FuREg-OPk5g/viewform" target="_blank" class="btn btn-form">
            📝 Заполнить форму
        </a>
        <a href="https://ayelatvia.lv/dnevnojlager" target="_blank" class="btn btn-site">
            🏕 Дневной лагерь
        </a>
    </div>

    <script>
        function updateTimer() {
            const now = new Date();
            let target = new Date(now.getFullYear(), 5, 1);
            if (now > target) target = new Date(now.getFullYear() + 1, 5, 1);

            const diff = target - now;
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const m = Math.floor((diff / 1000 / 60) % 60);
            const s = Math.floor((diff / 1000) % 60);

            document.getElementById('days').innerText = d;
            document.getElementById('hours').innerText = h < 10 ? '0' + h : h;
            document.getElementById('mins').innerText = m < 10 ? '0' + m : m;
            document.getElementById('secs').innerText = s < 10 ? '0' + s : s;
        }
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>

</body>
</html>
